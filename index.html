<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NordicPro EPG</title>
  <style>
    :root {
      --bg: #f5f1e8;
      --panel: #fffaf0;
      --ink: #1c1c18;
      --muted: #5e5a52;
      --accent: #0f766e;
      --border: #d8cfbe;
    }
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top right, #d8efe7 0, transparent 30%),
        linear-gradient(180deg, #f8f4ec 0%, #efe7d8 100%);
      color: var(--ink);
    }
    main {
      max-width: 820px;
      margin: 48px auto;
      padding: 0 20px;
    }
    .card {
      background: rgba(255, 250, 240, 0.92);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.08);
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 5vw, 3.5rem);
      line-height: 1;
    }
    p {
      color: var(--muted);
      font-size: 1.05rem;
    }
    a {
      color: var(--accent);
      word-break: break-all;
    }
    .box {
      margin-top: 18px;
      padding: 16px;
      border-radius: 14px;
      background: #fff;
      border: 1px solid var(--border);
    }
    code {
      font-family: Consolas, monospace;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>NordicPro Guide</h1>
      <p>Public files for IPTV players.</p>
      <div class="box">
        <strong>Playlist URL</strong><br />
        <a href="https://allelinde.github.io/epg-test-2-/playlist.m3u">https://allelinde.github.io/epg-test-2-/playlist.m3u</a><br /><br />
        <strong>EPG URL</strong><br />
        <a href="https://allelinde.github.io/epg-test-2-/guide.xml">https://allelinde.github.io/epg-test-2-/guide.xml</a>
      </div>
      <div class="box">
        <strong>File sizes</strong><br />
        <code>guide.xml</code>: 67.1 MB<br />
        <code>playlist.m3u</code>: 73.4 MB
      </div>
    </section>
  </main>
</body>
</html>
